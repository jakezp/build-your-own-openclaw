# Accepted model allowlist for the ChatGPT subscription backend.
# Edit this file to add a newly-released model; no Python change needed.
#
# A model is accepted iff it's in `allowed`, or matches one of `patterns`
# (fnmatch glob syntax).

allowed:
  - gpt-5.4
  - gpt-5.4-mini
  - gpt-5.2
  - gpt-5.2-codex
  - gpt-5.3-codex
  - gpt-5.1-codex
  - gpt-5.1-codex-max
  - gpt-5.1-codex-mini

patterns:
  - "*codex*"
