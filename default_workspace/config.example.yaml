# default_workspace/config.example.yaml
#
# This edition authenticates via ChatGPT subscription OAuth only.
# Run `my-bot login` once to populate the token store; do NOT put
# credentials in this file. The token store lives at
#   ~/.config/mybot/chatgpt_oauth.json     (POSIX)
#   %APPDATA%\mybot\chatgpt_oauth.json     (Windows)
#
# The accepted-model list is in ./models.yaml — edit that file to
# add a newly-released model id.

llm:
  provider: openai
  model: gpt-5.4

default_agent: pickle
